StylesPath = styles
MinAlertLevel = warning
Vocab = Portfolio

Packages = Google, write-good, alex

[*.{md,mdx}]
BasedOnStyles = Vale, Google, write-good, alex

# This is a personal portfolio (bio, blog) — first-person voice is the point,
# not a style violation the way it would be in product/instructional docs.
Google.FirstPerson = NO

# Stylistic choices for a personal voice, not errors: em dashes are used
# deliberately for asides, and exclamation points suit an informal bio/blog.
Google.EmDash = NO
Google.Exclamation = NO

# "Dataforms" (product name) vs "dataforms" (generic noun) is intentional,
# and video timestamps like "31s" don't need a nonbreaking space.
Vale.Terms = NO
Google.Units = NO
