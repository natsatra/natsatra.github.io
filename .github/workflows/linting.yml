name: linting

on:
    push:
      branches: [main]
    pull_request:
      branches: [main]
jobs:
    lint-and-build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: oven-sh/setup-bun@v2
        - run: bun install
        - run: bun run lint
        - run: bun run build
        - uses: vale-cli/vale-action@v2
          with:
            files: "src/content"
            fail_on_error: "false"
            reporter: "github-check"
            # reviewdog's github-check reporter exits 1 on ANY finding
            # (fail_on_error can't override it), so only surface errors in CI;
            # warnings still show when running vale locally.
            vale_flags: "--minAlertLevel=error"
